# Test Display Configuration

# DRM device path (use card1 for display on Raspberry Pi 5)
drm_device = "/dev/dri/card1"

# Display mode (uncomment to force specific resolution)
# If not specified, auto-detects from connected display
# [mode]
# width = 1920
# height = 1080
# refresh_rate = 60

# Background color in RGBA format
background_color = [0, 0, 0, 255]  # Black

# Text color in RGBA format (not used by test pattern, but required)
text_color = [0, 255, 0, 255]  # Green

# Font size in pixels (not used by test pattern, but required)
font_size = 32.0

# Target frames per second
target_fps = 60